# E2E mock stack (docs/spec.md section 3.10): paperhanger + GreptimeDB +
# Grafana + a generic-webhook sink, so the full alert -> telemetry collection
# -> repo resolution -> notify pipeline is observable end-to-end without any
# real Slack/Discord webhook or LLM/GitHub credentials.
#
# The mounted config (e2e/paperhanger.yaml) deliberately has no repo mappings
# configured, so repo resolution always returns null and every incident lands
# on `report_only` -- the "NO-LLM path". See README.md for how to layer real
# GitHub App + ANTHROPIC_API_KEY credentials on top for an actual fix-run.
#
# Quickstart: `docker compose up --wait`, then either run
# `bash scripts/e2e-smoke.sh` or POST an alert by hand:
#
#   curl -X POST 'http://localhost:8080/webhooks/generic?token=e2e-generic-secret' \
#     -H 'content-type: application/json' \
#     -d '{"status":"firing","severity":"critical","title":"demo","labels":{"service":"demo"},"annotations":{},"startsAt":"2026-01-01T00:00:00Z"}'
#
# then check `curl http://localhost:8080/incidents` and
# `curl http://localhost:8081/received`.

services:
  paperhanger:
    build: .
    ports:
      - "8080:8080"
    # Shutdown can take ~15s+ (drain + tracing bounds, plus sidecar stop
    # time) -- see README.md "Operational notes" -- so the default 10s
    # grace period isn't enough.
    stop_grace_period: 30s
    environment:
      GRAFANA_WEBHOOK_SECRET: ${GRAFANA_WEBHOOK_SECRET:-e2e-grafana-secret}
      GENERIC_WEBHOOK_SECRET: ${GENERIC_WEBHOOK_SECRET:-e2e-generic-secret}
      # Required by the config schema but never actually used for crypto in
      # the default no-repo-match path; override via .env for a real fix-run.
      GITHUB_APP_ID: ${GITHUB_APP_ID:-000000}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-placeholder-not-a-real-key}
      # Unset (empty) by default: the agent-host sidecar starts either way,
      # it just can't complete a real model call without this.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./e2e/paperhanger.yaml:/app/paperhanger.yaml:ro
      - paperhanger-data:/data
    depends_on:
      greptimedb:
        condition: service_healthy
      webhook-sink:
        condition: service_healthy
    # Uses the Dockerfile's own HEALTHCHECK (GET /healthz).

  greptimedb:
    image: greptime/greptimedb:v1.1.2
    command:
      - standalone
      - start
      - --http-addr=0.0.0.0:4000
      - --rpc-bind-addr=0.0.0.0:4001
      - --mysql-addr=0.0.0.0:4002
      - --postgres-addr=0.0.0.0:4003
    ports:
      - "4000-4003:4000-4003"
    healthcheck:
      # GET /health returns 200 with an empty JSON body once the server is up
      # (verified in docs/research/greptimedb.md section 7).
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./e2e/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      greptimedb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Tiny generic-webhook receiver standing in for Slack/Discord (spec section
  # 3.8): records every notification POST in memory so the notify path is
  # observable without a real chat webhook. A 10-line Bun script, not a
  # dedicated image -- run directly off the shared `oven/bun` base.
  webhook-sink:
    image: oven/bun:1.3
    working_dir: /sink
    volumes:
      - ./e2e/webhook-sink.ts:/sink/webhook-sink.ts:ro
    command: ["bun", "run", "/sink/webhook-sink.ts"]
    ports:
      - "8081:8080"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8080/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  paperhanger-data:
